<!DOCTYPE html>

<html lang="bs">

<head>
    <meta charset="utf-8" />
</head>

<body style="background-color: #D1E9FE;">
    <div style="width: 80vw; margin-left: auto; margin-right: auto;">
        <h3>Poštovani {{ Name }},</h3>
        <p>Administrator je zatražio promjene za Vaše vozilo <strong>{{ Vehicle }}</strong>.<br /></p>
        <h3>Lista promijena:</h3>
        <ul>
            {{ for Change in Changes }}
            {{if Change.Note }}
            <li>
                <h4>{{Change.Field}}: {{ Change.Note }}</h4>
            </li>
            {{else}}
            <li>
                <h4>{{Change.Field}}</h4>
            </li>
            {{ end }}
            {{ end }}
        </ul>
    </div>
<div style="width: 80vw; margin-left: auto; margin-right: auto;">
    <p>S poštovanjem,<br>Moj Prijevoz Team.</p>
</div>
</body>
</html>
