services:
  moj-prijevoz-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    container_name: moj-prijevoz-db
    env_file:
      - ../MojPrijevoz.WebApi/.env
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"
    expose:
      - 1433
    volumes:
      - database_data:/var/lib/database
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$SA_PASSWORD -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - moj-prijevoz  
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
        - .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - moj-prijevoz
  notifications:
    build:
      context: ../
      dockerfile: ../../MojPrijevoz/MojPrijevoz/MojPrijevoz.Notifications/Dockerfile
    secrets:
      - firebase_credentials
    env_file:
        - ../MojPrijevoz.WebApi/.env
    environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - RABBITMQ_HOST=rabbitmq 
        - DB_CONNECTION_STRING=Server=moj-prijevoz-db,1433;Database=MojPrijevoz;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True; 
        - FIREBASE_CREDENTIALS_PATH=/run/secrets/firebase_credentials
    container_name: notifications_service
    restart: unless-stopped
    depends_on:
      moj-prijevoz-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - moj-prijevoz    

secrets:
  firebase_credentials:
    file: ./firebase_credentials.json

volumes:
  rabbitmq_data:
  database_data:

networks:
  moj-prijevoz:
    driver: bridge